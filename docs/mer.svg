<text class="ts" x="484" y="816">FK PedidoId</text>
<text class="ts" x="484" y="834">FK ProdutoId</text>

<!-- SETAS -->
<line class="rel-line" x1="120" y1="160" x2="120" y2="240" marker-end="url(#arrow)"/>
<line class="rel-line" x1="120" y1="240" x2="280" y2="260" marker-end="url(#arrow)"/>
<text class="ts" x="104" y="190" fill="#555">1</text>
<text class="ts" x="260" y="256" fill="#555">N</text>

<line class="rel-line" x1="560" y1="176" x2="560" y2="240" marker-end="url(#arrow)"/>
<line class="rel-line" x1="560" y1="240" x2="420" y2="260" marker-end="url(#arrow)"/>
<text class="ts" x="562" y="190" fill="#555">1</text>
<text class="ts" x="408" y="256" fill="#555">N</text>

<line class="rel-line" x1="460" y1="352" x2="490" y2="352" marker-end="url(#arrow)"/>
<text class="ts" x="462" y="344" fill="#555">1:1</text>

<line class="rel-line" x1="270" y1="470" x2="220" y2="510" marker-end="url(#arrow)"/>
<text class="ts" x="223" y="484" fill="#555">N</text>

<line class="rel-line" x1="107" y1="426" x2="130" y2="510" marker-end="url(#arrow)"/>
<text class="ts" x="86" y="464" fill="#555">1</text>
<text class="ts" x="132" y="508" fill="#555">N</text>

<line class="rel-line" x1="215" y1="782" x2="255" y2="782" marker-end="url(#arrow)"/>
<text class="ts" x="218" y="774" fill="#555">1</text>
<text class="ts" x="240" y="774" fill="#555">N</text>

<line class="rel-line" x1="440" y1="782" x2="470" y2="782" marker-end="url(#arrow)"/>
<text class="ts" x="443" y="774" fill="#555">1</text>
<text class="ts" x="455" y="774" fill="#555">N</text>

<line class="rel-dash" x1="460" y1="390" x2="640" y2="390" marker-end="url(#arrow)"/>
<line class="rel-dash" x1="640" y1="390" x2="640" y2="700"/>
<text class="ts" x="644" y="540" fill="#555">N</text>

<!-- LEGENDA -->
<rect class="legend-box" x="30" y="918" width="620" height="50" rx="6"/>
<text class="ts" x="44" y="938" font-weight="600">Legenda:</text>
<text class="ts" x="120" y="938">🔑 Chave Primária (PK)</text>
<text class="ts" x="310" y="938">FK = Chave Estrangeira</text>
<text class="ts" x="490" y="938">req = obrigatório  opt = opcional</text>
<text class="ts" x="44" y="958">Cardinalidades indicadas nas setas: 1, N, 1:1, N:N (via tabela associativa)</text>
</svg>
