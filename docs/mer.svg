<rect class="box-blue-h" x="255" y="700" width="185" height="28" rx="8"/>
<rect x="255" y="714" width="185" height="14" fill="#185FA5"/>
<text class="th" x="347" y="720" text-anchor="middle" dominant-baseline="central">Pedido</text>
<text class="ts" x="269" y="744">🔑 Id (Guid, PK)</text>
<text class="ts" x="269" y="762">NumeroPedido (string, único)</text>
