<rect class="box-coral" x="60" y="510" width="200" height="128" rx="8"/>
<rect class="box-coral-h" x="60" y="510" width="200" height="28" rx="8"/>
<rect x="60" y="524" width="200" height="14" fill="#993C1D"/>
