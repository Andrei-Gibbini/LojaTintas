<!-- ITEM PEDIDO -->
<rect class="box-coral" x="470" y="700" width="190" height="164" rx="8"/>
<rect class="box-coral-h" x="470" y="700" width="190" height="28" rx="8"/>
<rect x="470" y="714" width="190" height="14" fill="#993C1D"/>
