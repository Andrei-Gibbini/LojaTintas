<svg width="680" height="980" viewBox="0 0 680 980" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Diagrama MER — Loja de Tintas</title>
<desc>Modelo Entidade-Relacionamento com 9 entidades</desc>
<style>
  text { font-family: Arial, sans-serif; fill: #1a1a1a; }
  .th { font-size: 14px; font-weight: 600; fill: #fff; }
  .ts { font-size: 11px; fill: #333; }
  .box-teal-h { fill: #0F6E56; }
  .box-teal   { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
  .box-purple-h{ fill: #534AB7; }
  .box-purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
  .box-amber-h{ fill: #854F0B; }
  .box-amber  { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
  .box-coral-h{ fill: #993C1D; }
  .box-coral  { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
  .box-blue-h { fill: #185FA5; }
  .box-blue   { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
  .rel-line   { stroke: #888; stroke-width: 1; fill: none; }
  .rel-dash   { stroke: #888; stroke-width: 1; fill: none; stroke-dasharray: 4 3; }
  .legend-box { fill: none; stroke: #aaa; stroke-width: 0.5; stroke-dasharray: 4 3; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- CATEGORIA -->
<rect class="box-teal" x="30" y="30" width="180" height="130" rx="8"/>
<rect class="box-teal-h" x="30" y="30" width="180" height="28" rx="8"/>
<rect x="30" y="44" width="180" height="14" fill="#0F6E56"/>
<text class="th" x="120" y="50" text-anchor="middle" dominant-baseline="central">Categoria</text>
<text class="ts" x="44" y="74">🔑 Id (int, PK)</text>
<text class="ts" x="44" y="92">Nome (string, obrigatório)</text>
<text class="ts" x="44" y="110">Descricao (string, opcional)</text>

<!-- FABRICANTE -->
<rect class="box-teal" x="470" y="30" width="180" height="146" rx="8"/>
<rect class="box-teal-h" x="470" y="30" width="180" height="28" rx="8"/>
<rect x="470" y="44" width="180" height="14" fill="#0F6E56"/>
